<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>লাউ রানার - তুষারপাত ও ঊষালগ্ন সংস্করণ</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b111e; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        /* শুধুমাত্র হুসাইনের জন্য ক্যারেক্টার নেম ট্যাগ স্টাইলিং (CSS2D) */
        .character-label {
            color: #00ffcc;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 8px;
            border: 1px solid #00ffcc;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* টপ বার স্টাইলিং */
        #top-bar { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .ui-btn { background: linear-gradient(135deg, #1f4068, #162447); color: #e4e4e4; border: 1px solid #00ffcc; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); transition: transform 0.2s; }
        .ui-btn:active { transform: scale(0.95); }
        #restart-btn-ui { background: linear-gradient(135deg, #e43f5a, #1f4068); box-shadow: 0 4px 15px rgba(228, 63, 90, 0.3); border: none; }
        
        /* স্কোর ডিসপ্লে */
        #score-board { position: absolute; top: 75px; left: 20px; background: rgba(11, 17, 30, 0.7); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 18px; font-weight: bold; border: 1px solid rgba(0, 255, 204, 0.3); backdrop-filter: blur(5px); z-index: 10; }
        #score-val { color: #00ffcc; font-size: 22px; text-shadow: 0 0 5px rgba(0,255,204,0.5); }

        /* কন্ট্রোল বাটনসমূহ */
        #controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .nav-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(0, 255, 204, 0.3); color: white; border-radius: 50%; font-size: 28px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .nav-btn:active { background: rgba(0, 255, 204, 0.2); }
        #jump-btn { width: 95px; height: 95px; background: linear-gradient(135deg, #00ffcc, #1f4068); border: 2px solid #ffffff; color: white; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 255, 204, 0.4); transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #jump-btn:active { transform: scale(0.9); }

        /* ওভারলে স্ক্রিনসমূহ */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 17, 30, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; z-index: 20; backdrop-filter: blur(8px); }
        #game-over-text { font-size: 42px; color: #e43f5a; text-align: center; font-weight: 900; text-shadow: 0 4px 10px rgba(228, 63, 90, 0.5); animation: pulse 1s infinite alternate; }
        
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, #0f172a, #1e293b); display:flex; flex-direction: column; justify-content:center; align-items:center; z-index:100; }
        .game-title { color: #ffffff; font-size: 34px; font-weight: bold; margin-bottom: 30px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); text-align: center; line-height: 1.4; }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 4px 10px rgba(228, 63, 90, 0.3); }
            100% { transform: scale(1.05); text-shadow: 0 4px 20px rgba(228, 63, 90, 0.7); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>

    <div id="start-screen">
        <div class="game-title">❄️ লাউ রানার 3D ❄️<br><span style="font-size: 18px; color: #00ffcc;">ঊষালগ্ন ও মৃদু তুষারপাত সংস্করণ</span></div>
        <button class="ui-btn" style="font-size: 22px; padding: 16px 45px; background: linear-gradient(135deg, #00ffcc, #1f4068); color: white; border: none; box-shadow: 0 6px 20px rgba(0,255,204,0.3);" onclick="startTheGame()">গেম শুরু করুন 🚀</button>
    </div>

    <div id="top-bar">
        <button class="ui-btn" onclick="togglePause()" id="pause-btn-ui">PAUSE</button>
        <button class="ui-btn" id="restart-btn-ui" onclick="restartGame()">RESTART</button>
    </div>

    <div id="score-board">স্কোর: <span id="score-val">0</span></div>

    <div id="controls-container">
        <button class="nav-btn" id="left-btn">◀</button>
        <button id="jump-btn">JUMP</button>
        <button class="nav-btn" id="right-btn">▶</button>
    </div>

    <div id="game-over-screen" class="overlay-screen">
        <div id="game-over-text">⚠️ এই লাউ ঢুকে গেল..!</div>
        <div id="final-score" style="color: white; font-size: 22px; margin-top: 15px;">আপনার স্কোর: 0</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px; background: linear-gradient(135deg, #e43f5a, #1f4068); border: none; color: white;" onclick="restartGame()">আবার খেলুন 🔄</button>
    </div>

    <div id="pause-screen" class="overlay-screen">
        <div style="font-size: 40px; color: white; font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">গেম থামানো হয়েছে ⏸</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px; background: linear-gradient(135deg, #00ffcc, #1f4068); border: none; color: white;" onclick="togglePause()">RESUME ▶</button>
    </div>

    <script>
        let scene, camera, renderer, labelRenderer, player, thief, wife;
        let obstacles = [], environmentObjects = [], snowflakes = [];
        let lanes = [-2.2, 0, 2.2], currentLane = 1, targetX = 0;
        
        let isGrounded = true;
        let playerVelocityY = 0;
        
        // গ্র্যাভিটি ও লাফানোর বল সামান্য অ্যাডজাস্ট করা হয়েছে যেন বেশি গতিতেও জাম্প ঠিকঠাক কাজ করে
        const gravity = -0.018; 
        const jumpForce = 0.28; 

        let gameActive = false, isPaused = false;
        
        // শুরুতে গতি বাড়ানো হলো (আগে ০.২২ ছিল)
        const baseSpeed = 0.30; 
        let speed = baseSpeed; 
        
        let score = 0;
        let spawnTimer = 0, envTimer = 0, animationTime = 0;
        let pLeftLeg, pRightLeg, pLeftArm, pRightArm, tLeftLeg, tRightLeg;

        let audioListener, bgmSound;
        const audioUrl = 'https://www.image2url.com/r2/default/audio/1780138650031-27a68bd5-d29e-4008-a59e-1a0beee58ccc.mp3';

        function startTheGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            init();
            animate();
            setupAudio();
            setupControls();
        }

        function setupAudio() {
            if (!audioListener) {
                audioListener = new THREE.AudioListener();
                camera.add(audioListener);
            }
            if (audioListener.context && audioListener.context.state === 'suspended') {
                audioListener.context.resume();
            }

            bgmSound = new THREE.Audio(audioListener);
            const audioLoader = new THREE.AudioLoader();
            
            audioLoader.load(audioUrl, function(buffer) {
                bgmSound.setBuffer(buffer);
                bgmSound.setLoop(true);
                bgmSound.setVolume(0.7);
                if (gameActive && !isPaused) {
                    bgmSound.play();
                }
            }, null, function(err) {
                playFallbackAudio();
            });
        }

        function playFallbackAudio() {
            try {
                let audio = new Audio(audioUrl);
                audio.loop = true;
                audio.volume = 0.7;
                audio.play();
                bgmSound = {
                    play: () => audio.play(),
                    pause: () => audio.pause(),
                    stop: () => { audio.pause(); audio.currentTime = 0; },
                    isPlaying: !audio.paused
                };
            } catch(e) {
                console.error("Audio failed: ", e);
            }
        }

        function setupControls() {
            document.getElementById('jump-btn').addEventListener('click', function(e) { e.preventDefault(); triggerJump(); });
            document.getElementById('jump-btn').addEventListener('touchstart', function(e) { e.preventDefault(); triggerJump(); });
            document.getElementById('left-btn').addEventListener('click', function(e) { e.preventDefault(); moveSide(-1); });
            document.getElementById('left-btn').addEventListener('touchstart', function(e) { e.preventDefault(); moveSide(-1); });
            document.getElementById('right-btn').addEventListener('click', function(e) { e.preventDefault(); moveSide(1); });
            document.getElementById('right-btn').addEventListener('touchstart', function(e) { e.preventDefault(); moveSide(1); });

            window.addEventListener('keydown', (e) => {
                if (!gameActive || isPaused) return;
                if (e.code === 'Space' || e.code === 'ArrowUp') triggerJump();
                if (e.code === 'ArrowLeft') moveSide(-1);
                if (e.code === 'ArrowRight') moveSide(1);
            });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', handleTilt);
            }
        }

        function init() {
            scene = new THREE.Scene();
            
            scene.background = new THREE.Color(0x131c2e); 
            scene.fog = new THREE.FogExp2(0x131c2e, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5.2, 8.5);
            camera.lookAt(0, 1.8, -4);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.1; 
            document.body.appendChild(renderer.domElement);

            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            let ambientLight = new THREE.AmbientLight(0x2c3b59, 0.95); 
            scene.add(ambientLight);

            let hemiLight = new THREE.HemisphereLight(0x5a738e, 0x1a233a, 0.7); 
            hemiLight.position.set(0, 30, 0);
            scene.add(hemiLight);

            let sunriseLight = new THREE.DirectionalLight(0xffca28, 2.8); 
            sunriseLight.position.set(-20, 15, -40); 
            sunriseLight.castShadow = true;
            sunriseLight.shadow.mapSize.width = 2048; 
            sunriseLight.shadow.mapSize.height = 2048;
            sunriseLight.shadow.bias = -0.0002;
            scene.add(sunriseLight);

            createSnowEnvironment();

            player = createHumanCharacter(false, 'হুসাইন'); 
            scene.add(player);
            
            thief = createHumanCharacter(true, ''); 
            thief.position.set(0, 0, -12); 
            scene.add(thief); 
            
            wife = createWifeCharacter(); 
            scene.add(wife);

            for(let i=0; i<25; i++) {
                spawnSnowTree((Math.random() * -400) - 20);
            }

            window.addEventListener('resize', onWindowResize);
        }

        function createSnowEnvironment() {
            let roadGeo = new THREE.BoxGeometry(7.2, 0.2, 1000);
            let roadMat = new THREE.MeshStandardMaterial({ color: 0x273248, roughness: 0.8 });
            let road = new THREE.Mesh(roadGeo, roadMat);
            road.position.z = -450;
            road.receiveShadow = true;
            scene.add(road);

            for(let l of lanes) {
                let lineGeo = new THREE.BoxGeometry(0.12, 0.22, 1000);
                let lineMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00a8ff, emissiveIntensity: 0.3 });
                let line = new THREE.Mesh(lineGeo, lineMat);
                line.position.set(l, -0.01, -450);
                scene.add(line);
            }

            let snowFieldMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.9 });
            let fieldL = new THREE.Mesh(new THREE.BoxGeometry(60, 0.1, 1000), snowFieldMat);
            fieldL.position.set(-33.6, -0.05, -450);
            fieldL.receiveShadow = true;
            scene.add(fieldL);
            
            let fieldR = fieldL.clone(); 
            fieldR.position.x = 33.6; 
            scene.add(fieldR);

            let snowGeo = new THREE.BufferGeometry();
            let count = 600;
            let positions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i+=3) {
                positions[i] = (Math.random() - 0.5) * 40;     
                positions[i+1] = Math.random() * 20;           
                positions[i+2] = (Math.random() - 0.5) * 50;   
            }
            snowGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            let snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.85 });
            let snowParticles = new THREE.Points(snowGeo, snowMat);
            scene.add(snowParticles);
            snowflakes.push(snowParticles);
        }

        function handleTilt(event) {
            if (!gameActive || isPaused) return;
            let tilt = event.gamma; 
            if (tilt > 25) tilt = 25; if (tilt < -25) tilt = -25;
            targetX = (tilt / 25) * 2.2; 
        }

        function moveSide(dir) {
            if (!gameActive || isPaused) return;
            currentLane += dir;
            if(currentLane < 0) currentLane = 0;
            if(currentLane > 2) currentLane = 2;
            targetX = lanes[currentLane];
        }

        function triggerJump() { 
            if (isGrounded && gameActive && !isPaused) { 
                playerVelocityY = jumpForce; 
                isGrounded = false; 
            } 
        }

        function createHumanCharacter(isThief, nameText) {
            const group = new THREE.Group();
            
            let coatMat = new THREE.MeshStandardMaterial({ color: isThief ? 0x1a1a2e : 0x222831, roughness: 0.5 });
            let coat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.5), coatMat);
            coat.position.y = 1.4; 
            coat.castShadow = true; 
            coat.receiveShadow = true;
            group.add(coat);

            let bodyMat = new THREE.MeshStandardMaterial({ color: isThief ? 0x393e46 : 0x4f8a8b, roughness: 0.5 });
            let lowerBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.44, 0.65, 16), bodyMat);
            lowerBody.castShadow = true;
            lowerBody.position.y = 0.88; 
            group.add(lowerBody);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffd1b3, roughness: 0.4 }));
            head.position.y = 2.0; 
            head.castShadow = true;
            group.add(head);

            if(isThief) {
                let maskMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });
                let mask = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.22, 0.38), maskMat);
                mask.position.set(0, 2.0, -0.1); 
                group.add(mask);
            } else {
                let hairMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8 });
                let hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), hairMat);
                hairTop.position.set(0, 2.12, 0.02);
                hairTop.scale.set(1.1, 1.0, 1.1);
                group.add(hairTop);

                let hairBack = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.3, 0.35), hairMat);
                hairBack.position.set(0, 2.0, 0.12);
                group.add(hairBack);
            }

            let legGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.58, 12);
            let skinMat = new THREE.MeshStandardMaterial({ color: 0xffd1b3 });
            let leftLeg = new THREE.Mesh(legGeo, skinMat);
            leftLeg.position.set(-0.2, 0.29, 0); 
            leftLeg.castShadow = true; 
            group.add(leftLeg);
            
            let rightLeg = leftLeg.clone(); 
            rightLeg.position.x = 0.2; 
            group.add(rightLeg);

            let armGeo = new THREE.BoxGeometry(0.14, 0.65, 0.14);
            let leftArm = new THREE.Mesh(armGeo, coatMat); 
            leftArm.position.set(-0.5, 1.35, 0); leftArm.castShadow = true;
            group.add(leftArm);
            
            let rightArm = leftArm.clone(); rightArm.position.x = 0.5; group.add(rightArm);

            if (!isThief && nameText !== '') {
                const div = document.createElement('div');
                div.className = 'character-label';
                div.textContent = nameText;
                const label = new THREE.CSS2DObject(div);
                label.position.set(0, 2.7, 0);
                group.add(label);
            }

            if (isThief) { tLeftLeg = leftLeg; tRightLeg = rightLeg; } 
            else { pLeftLeg = leftLeg; pRightLeg = rightLeg; pLeftArm = leftArm; pRightArm = rightArm; }
            return group;
        }

        function createWifeCharacter() {
            const group = new THREE.Group();
            let outfitMat = new THREE.MeshStandardMaterial({ color: 0xb5525c, roughness: 0.6 });
            let body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 1.1, 16), outfitMat);
            body.position.y = 0.6; body.castShadow = true;
            group.add(body);
            
            let head = new THREE.Mesh(new THREE.SphereGeometry(0.23, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffd1b3 }));
            head.position.y = 1.45; group.add(head);

            let hairMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            let longHair = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.18), hairMat);
            longHair.position.set(0, 1.2, 0.15); group.add(longHair);

            group.rotation.z = Math.PI / 2.5; 
            return group;
        }

        function spawnSnowTree(zPos) {
            let tree = new THREE.Group();
            let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.26, 3.0, 10), new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.9 }));
            trunk.position.y = 1.5; trunk.castShadow = true;
            tree.add(trunk);
            
            let leavesMat = new THREE.MeshStandardMaterial({ color: 0x4a6984, roughness: 0.7 }); 
            let leaves1 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 2.0, 8), leavesMat);
            leaves1.position.y = 2.8; leaves1.castShadow = true;
            tree.add(leaves1);

            let leaves2 = new THREE.Mesh(new THREE.ConeGeometry(1.1, 1.6, 8), new THREE.MeshStandardMaterial({ color: 0xdce7f3, roughness: 0.6 }));
            leaves2.position.y = 3.8; leaves2.castShadow = true; 
            tree.add(leaves2);
            
            let side = Math.random() > 0.5 ? 1 : -1;
            tree.position.set(side * (5.5 + Math.random() * 6), 0, zPos);
            scene.add(tree); environmentObjects.push(tree);
        }

        function spawnLau() {
            let lauGroup = new THREE.Group();
            let lauMat = new THREE.MeshStandardMaterial({ color: 0x8be4a4, roughness: 0.25, metalness: 0.1 }); 

            let bottom = new THREE.Mesh(new THREE.SphereGeometry(0.44, 16, 16), lauMat);
            bottom.position.y = 0.4; bottom.castShadow = true;
            lauGroup.add(bottom);

            let neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.34, 0.8, 12), lauMat);
            neck.position.y = 0.9; neck.castShadow = true;
            lauGroup.add(neck);

            let randomLane = lanes[Math.floor(Math.random() * 3)];
            lauGroup.position.set(randomLane, -0.05, -90); 
            
            scene.add(lauGroup);
            obstacles.push(lauGroup);
        }

        function togglePause() { 
            if (!gameActive) return; 
            isPaused = !isPaused; 
            document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none'; 
            
            if (bgmSound) {
                if (isPaused) { if(typeof bgmSound.pause === 'function') bgmSound.pause(); } 
                else { if(typeof bgmSound.play === 'function') bgmSound.play(); }
            }
        }
        
        function gameOver() { 
            gameActive = false; 
            document.getElementById('game-over-screen').style.display = 'flex'; 
            document.getElementById('final-score').innerText = "আপনার স্কোর: " + Math.floor(score);
            if (bgmSound && typeof bgmSound.stop === 'function') bgmSound.stop();
        }

        function restartGame() {
            for (let i = 0; i < obstacles.length; i++) scene.remove(obstacles[i]); obstacles = [];
            targetX = 0; currentLane = 1; score = 0;
            speed = baseSpeed; 
            
            player.position.set(0, 0, 0); player.rotation.z = 0; 
            thief.position.set(0, 0, -12); 
            playerVelocityY = 0; isGrounded = true; gameActive = true; isPaused = false; spawnTimer = 0; animationTime = 0;
            
            document.getElementById('game-over-screen').style.display = 'none'; 
            document.getElementById('pause-screen').style.display = 'none';
            document.getElementById('score-val').innerText = "0";
            
            if (bgmSound && typeof bgmSound.play === 'function') bgmSound.play();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive && !isPaused) {
                // গতি বাড়ার সাথে সাথে অ্যানিমেশন এবং স্কোর কাউন্টিং স্পিডও মানানসই করা হলো
                animationTime += (0.18 * (speed / baseSpeed)); 
                score += (0.15 * (speed / baseSpeed)); 
                document.getElementById('score-val').innerText = Math.floor(score);

                // গতি বৃদ্ধির হার দ্বিগুণ করা হলো (০.MDA0MDQ থেকে ০.MDA0MDg)
                speed += 0.00008; 
                if(speed > 0.70) speed = 0.70; // সর্বোচ্চ গতিসীমা বাড়ানো হলো (০.৫২ থেকে ০.৭০)

                let xDiff = targetX - player.position.x;
                player.position.x += xDiff * 0.22; 
                player.rotation.z = -xDiff * 0.22;

                if(player.position.x > 3.0) player.position.x = 3.0;
                if(player.position.x < -3.0) player.position.x = -3.0;

                player.position.y += playerVelocityY; 
                playerVelocityY += gravity;
                
                if (player.position.y <= 0) { 
                    player.position.y = 0; 
                    playerVelocityY = 0; 
                    isGrounded = true; 
                }

                if (isGrounded) {
                    pLeftLeg.rotation.x = Math.sin(animationTime) * 0.75; 
                    pRightLeg.rotation.x = -Math.sin(animationTime) * 0.75;
                    pLeftArm.rotation.x = -Math.sin(animationTime) * 0.6; 
                    pRightArm.rotation.x = Math.sin(animationTime) * 0.6;
                    player.position.y = Math.abs(Math.sin(animationTime * 2)) * 0.08;
                } else {
                    pLeftLeg.rotation.x = -0.4; pRightLeg.rotation.x = 0.2;
                    pLeftArm.rotation.x = 0.4; pRightArm.rotation.x = -0.3;
                }

                thief.position.z = player.position.z - 12;
                thief.position.x = THREE.MathUtils.lerp(thief.position.x, player.position.x * 0.7, 0.05); 
                tLeftLeg.rotation.x = Math.sin(animationTime * 1.1) * 0.6; 
                tRightLeg.rotation.x = -Math.sin(animationTime * 1.1) * 0.6;
                
                wife.position.set(thief.position.x + 0.4, thief.position.y + 1.2, thief.position.z);

                camera.position.z = player.position.z + 8.5; 
                camera.position.x = player.position.x * 0.5;

                for(let s of snowflakes) {
                    let positions = s.geometry.attributes.position.array;
                    for(let i=1; i<positions.length; i+=3) {
                        positions[i] -= 0.04; 
                        if(positions[i] < 0) positions[i] = 20; 
                    }
                    s.geometry.attributes.position.needsUpdate = true;
                }

                envTimer++; 
                if(envTimer > 20) { 
                    spawnSnowTree(-200); 
                    envTimer = 0; 
                }
                for (let i = environmentObjects.length - 1; i >= 0; i--) {
                    environmentObjects[i].position.z += speed;
                    if (environmentObjects[i].position.z > 15) { 
                        scene.remove(environmentObjects[i]); 
                        environmentObjects.splice(i, 1); 
                    }
                }

                spawnTimer++; 
                // লাউ আসার সময় কমিয়ে ৩০ ফ্রেম করা হলো (আগে ৪৫ ছিল), যার ফলে লাউ দ্রুত আসবে
                if (spawnTimer > 30) { 
                    spawnLau(); 
                    spawnTimer = 0; 
                }
                
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;
                    
                    let diffX = Math.abs(player.position.x - obstacles[i].position.x);
                    let diffZ = Math.abs(player.position.z - obstacles[i].position.z);
                    
                    if (diffX < 0.8 && diffZ < 0.8) { 
                        if (player.position.y < 1.1) { 
                            gameOver(); 
                        }
                    }
                    if (obstacles[i].position.z > 15) { 
                        scene.remove(obstacles[i]); 
                        obstacles.splice(i, 1); 
                    }
                }
            }
            if(renderer) renderer.render(scene, camera);
            if(labelRenderer) labelRenderer.render(scene, camera); 
        }

        function onWindowResize() { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
