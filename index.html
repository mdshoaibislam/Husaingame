<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>লাউ রানার - গোধূলি সন্ধ্যা সংস্করণ</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a0f2e; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        /* ক্যারেক্টার নেম ট্যাগ স্টাইলিং (CSS2D) */
        .character-label {
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .label-husain { border-color: #00ffcc; color: #00ffcc; }
        .label-thief { border-color: #ff3333; color: #ff3333; }
        .label-wife { border-color: #ff33cc; color: #ff33cc; }

        /* টপ বার স্টাইলিং */
        #top-bar { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .ui-btn { background: linear-gradient(135deg, #ff4e50, #f9d423); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 78, 80, 0.4); transition: transform 0.2s; }
        .ui-btn:active { transform: scale(0.95); }
        #restart-btn-ui { background: linear-gradient(135deg, #e65c00, #f9d423); box-shadow: 0 4px 15px rgba(230, 92, 0, 0.4); }
        
        /* স্কোর ডিসপ্লে */
        #score-board { position: absolute; top: 75px; left: 20px; background: rgba(30, 10, 40, 0.6); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 18px; font-weight: bold; border: 1px solid rgba(255, 100, 100, 0.2); backdrop-filter: blur(5px); z-index: 10; }
        #score-val { color: #ffa500; font-size: 22px; text-shadow: 0 0 5px rgba(255,165,0,0.5); }

        /* কন্ট্রোল বাটনসমূহ */
        #controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .nav-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.12); border: 2px solid rgba(255, 120, 120, 0.4); color: white; border-radius: 50%; font-size: 28px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .nav-btn:active { background: rgba(255, 255, 255, 0.3); }
        #jump-btn { width: 95px; height: 95px; background: linear-gradient(135deg, #ff4e50, #f9d423); border: 3px solid #ffffff; color: white; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 20px rgba(255, 78, 80, 0.6); transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #jump-btn:active { transform: scale(0.9); }

        /* ওভারলে স্ক্রিনসমূহ */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(25, 10, 30, 0.88); display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; z-index: 20; backdrop-filter: blur(8px); }
        #game-over-text { font-size: 42px; color: #ff4e50; text-align: center; font-weight: 900; text-shadow: 0 4px 10px rgba(255, 78, 80, 0.5); animation: pulse 1s infinite alternate; }
        
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, #2b1055, #7597de); display:flex; flex-direction: column; justify-content:center; align-items:center; z-index:100; }
        .game-title { color: #ffffff; font-size: 38px; font-weight: bold; margin-bottom: 30px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); text-align: center; }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 4px 10px rgba(255, 78, 80, 0.3); }
            100% { transform: scale(1.05); text-shadow: 0 4px 20px rgba(255, 78, 80, 0.7); }
        }
    </style>
    <!-- Three.js and CSS2DRenderer Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>

    <div id="start-screen">
        <div class="game-title">🌇 লাউ রানার 3D <br><span style="font-size: 20px; color: #f9d423;">স্বাভাবিক গতি ও উন্নত গ্রাফিক্স সংস্করণ</span></div>
        <button class="ui-btn" style="font-size: 24px; padding: 18px 50px; background: linear-gradient(135deg, #ff4e50, #f9d423); box-shadow: 0 6px 20px rgba(255,78,80,0.5);" onclick="startTheGame()">গেম শুরু করুন 🚀</button>
    </div>

    <div id="top-bar">
        <button class="ui-btn" onclick="togglePause()" id="pause-btn-ui">PAUSE</button>
        <button class="ui-btn" id="restart-btn-ui" onclick="restartGame()">RESTART</button>
    </div>

    <div id="score-board">স্কোর: <span id="score-val">0</span></div>

    <div id="controls-container">
        <button class="nav-btn" id="left-btn">◀</button>
        <button id="jump-btn">JUMP</button>
        <button class="nav-btn" id="right-btn">▶</button>
    </div>

    <div id="game-over-screen" class="overlay-screen">
        <div id="game-over-text">⚠️ এই লাউ ঢুকে গেল..!</div>
        <div id="final-score" style="color: white; font-size: 22px; margin-top: 15px;">আপনার স্কোর: 0</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px; background: linear-gradient(135deg, #ff4e50, #f9d423);" onclick="restartGame()">আবার খেলুন 🔄</button>
    </div>

    <div id="pause-screen" class="overlay-screen">
        <div style="font-size: 40px; color: white; font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">গেম থামানো হয়েছে ⏸</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px; background: linear-gradient(135deg, #e65c00, #f9d423);" onclick="togglePause()">RESUME ▶</button>
    </div>

    <script>
        let scene, camera, renderer, labelRenderer, player, thief, wife;
        let obstacles = [], environmentObjects = [];
        let lanes = [-2.2, 0, 2.2], currentLane = 1, targetX = 0;
        
        let isGrounded = true;
        let playerVelocityY = 0;
        const gravity = -0.015; 
        const jumpForce = 0.35; 

        let gameActive = false, isPaused = false;
        
        // দৌড়ানোর স্পীড স্বাভাবিক করা হলো (খুব দ্রুত বা একদম স্লো নয়)
        const baseSpeed = 0.22; 
        let speed = baseSpeed; 
        
        let score = 0;
        let spawnTimer = 0, envTimer = 0, animationTime = 0;
        let pLeftLeg, pRightLeg, pLeftArm, pRightArm, tLeftLeg, tRightLeg;

        let audioListener, bgmSound;
        const audioUrl = 'https://www.image2url.com/r2/default/audio/1780138650031-27a68bd5-d29e-4008-a59e-1a0beee58ccc.mp3';

        function startTheGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            init();
            animate();
            setupAudio();
            setupControls();
        }

        function setupAudio() {
            if (!audioListener) {
                audioListener = new THREE.AudioListener();
                camera.add(audioListener);
            }
            if (audioListener.context && audioListener.context.state === 'suspended') {
                audioListener.context.resume();
            }

            bgmSound = new THREE.Audio(audioListener);
            const audioLoader = new THREE.AudioLoader();
            
            audioLoader.load(audioUrl, function(buffer) {
                bgmSound.setBuffer(buffer);
                bgmSound.setLoop(true);
                bgmSound.setVolume(0.7);
                if (gameActive && !isPaused) {
                    bgmSound.play();
                }
            }, null, function(err) {
                playFallbackAudio();
            });
        }

        function playFallbackAudio() {
            try {
                let audio = new Audio(audioUrl);
                audio.loop = true;
                audio.volume = 0.7;
                audio.play();
                bgmSound = {
                    play: () => audio.play(),
                    pause: () => audio.pause(),
                    stop: () => { audio.pause(); audio.currentTime = 0; },
                    isPlaying: !audio.paused
                };
            } catch(e) {
                console.error("Audio failed: ", e);
            }
        }

        function setupControls() {
            document.getElementById('jump-btn').addEventListener('click', function(e) { e.preventDefault(); triggerJump(); });
            document.getElementById('jump-btn').addEventListener('touchstart', function(e) { e.preventDefault(); triggerJump(); });
            document.getElementById('left-btn').addEventListener('click', function(e) { e.preventDefault(); moveSide(-1); });
            document.getElementById('left-btn').addEventListener('touchstart', function(e) { e.preventDefault(); moveSide(-1); });
            document.getElementById('right-btn').addEventListener('click', function(e) { e.preventDefault(); moveSide(1); });
            document.getElementById('right-btn').addEventListener('touchstart', function(e) { e.preventDefault(); moveSide(1); });

            window.addEventListener('keydown', (e) => {
                if (!gameActive || isPaused) return;
                if (e.code === 'Space' || e.code === 'ArrowUp') triggerJump();
                if (e.code === 'ArrowLeft') moveSide(-1);
                if (e.code === 'ArrowRight') moveSide(1);
            });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', handleTilt);
            }
        }

        function init() {
            scene = new THREE.Scene();
            
            scene.background = new THREE.Color(0x3a1c4d); 
            scene.fog = new THREE.FogExp2(0x3a1c4d, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5.2, 8.5);
            camera.lookAt(0, 1.8, -4);

            // WebGL Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            // CSS2D Renderer (ক্যারেক্টারের মাথার উপর লেখার জন্য)
            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // লাইটিং
            let ambientLight = new THREE.AmbientLight(0xff7b7b, 0.6); 
            scene.add(ambientLight);

            let hemiLight = new THREE.HemisphereLight(0x7a5c93, 0x24142c, 0.4);
            hemiLight.position.set(0, 30, 0);
            scene.add(hemiLight);

            let sunsetLight = new THREE.DirectionalLight(0xff7e47, 2.0); 
            sunsetLight.position.set(-25, 12, -30); 
            sunsetLight.castShadow = true;
            sunsetLight.shadow.mapSize.width = 2048;
            sunsetLight.shadow.mapSize.height = 2048;
            sunsetLight.shadow.bias = -0.0002;
            scene.add(sunsetLight);

            createSunsetClouds();

            // রাস্তা
            let roadGeo = new THREE.BoxGeometry(7.2, 0.2, 1000);
            let roadMat = new THREE.MeshStandardMaterial({ color: 0x221a2e, roughness: 0.7, metalness: 0.1 });
            let road = new THREE.Mesh(roadGeo, roadMat);
            road.position.z = -450;
            road.receiveShadow = true;
            scene.add(road);

            // নিয়ন বর্ডার লাইনস
            for(let l of lanes) {
                let lineGeo = new THREE.BoxGeometry(0.15, 0.22, 1000);
                let lineMat = new THREE.MeshStandardMaterial({ color: 0xff5500, roughness: 0.2, emissive: 0xff2200, emissiveIntensity: 0.5 });
                let line = new THREE.Mesh(lineGeo, lineMat);
                line.position.set(l, -0.01, -450);
                scene.add(line);
            }

            // ঘাস বা মাঠ
            let grassMat = new THREE.MeshStandardMaterial({ color: 0x1e3815, roughness: 0.9 });
            let grassL = new THREE.Mesh(new THREE.BoxGeometry(60, 0.1, 1000), grassMat);
            grassL.position.set(-33.6, -0.05, -450);
            grassL.receiveShadow = true;
            scene.add(grassL);
            
            let grassR = grassL.clone(); 
            grassR.position.x = 33.6; 
            scene.add(grassR);

            // ক্যারেক্টার তৈরি
            player = createHumanCharacter(false, 'হুসাইন', 'label-husain'); 
            scene.add(player);
            
            thief = createHumanCharacter(true, 'হুসেইনের বউ চোর', 'label-thief'); 
            thief.position.set(0, 0, -12); 
            scene.add(thief); 
            
            wife = createWifeCharacter('হুসাইনের বউ', 'label-wife'); 
            scene.add(wife);

            for(let i=0; i<20; i++) {
                spawnTree((Math.random() * -400) - 20);
            }

            window.addEventListener('resize', onWindowResize);
        }

        function createSunsetClouds() {
            let cloudMat = new THREE.MeshLambertMaterial({ color: 0xff6b81, transparent: true, opacity: 0.3 });
            for(let i=0; i<15; i++) {
                let cloudGroup = new THREE.Group();
                let numBlobs = 3 + Math.floor(Math.random() * 4);
                for(let j=0; j<numBlobs; j++) {
                    let blob = new THREE.Mesh(new THREE.SphereGeometry(4 + Math.random() * 5, 8, 8), cloudMat);
                    blob.position.set(j * 5, Math.random() * 2, Math.random() * 2);
                    blob.scale.set(1.6, 0.6, 1);
                    cloudGroup.add(blob);
                }
                cloudGroup.position.set((Math.random() - 0.5) * 100, 18 + Math.random() * 8, -50 - (Math.random() * 200));
                scene.add(cloudGroup);
                environmentObjects.push(cloudGroup);
            }
        }

        function handleTilt(event) {
            if (!gameActive || isPaused) return;
            let tilt = event.gamma; 
            if (tilt > 25) tilt = 25; if (tilt < -25) tilt = -25;
            targetX = (tilt / 25) * 2.2; 
        }

        function moveSide(dir) {
            if (!gameActive || isPaused) return;
            currentLane += dir;
            if(currentLane < 0) currentLane = 0;
            if(currentLane > 2) currentLane = 2;
            targetX = lanes[currentLane];
        }

        function triggerJump() { 
            if (isGrounded && gameActive && !isPaused) { 
                playerVelocityY = jumpForce; 
                isGrounded = false; 
            } 
        }

        function createHumanCharacter(isThief, nameText, className) {
            const group = new THREE.Group();
            
            let coatMat = new THREE.MeshStandardMaterial({ color: isThief ? 0x222222 : 0x1e3c72, roughness: 0.4 });
            let coat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.5), coatMat);
            coat.position.y = 1.4; 
            coat.castShadow = true; 
            coat.receiveShadow = true;
            group.add(coat);

            let lungiGroup = new THREE.Group();
            let lungiMat = new THREE.MeshStandardMaterial({ color: isThief ? 0x5c0632 : 0x00a8cc, roughness: 0.5 });
            let lungiMain = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.44, 0.65, 16), lungiMat);
            lungiMain.castShadow = true;
            lungiGroup.add(lungiMain); 
            lungiGroup.position.y = 0.88; 
            group.add(lungiGroup);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffd1b3, roughness: 0.4 }));
            head.position.y = 2.0; 
            head.castShadow = true;
            group.add(head);

            if(isThief) {
                let mask = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.18, 0.32), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                mask.position.set(0, 1.95, -0.12); group.add(mask);
            }

            let legGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.58, 12);
            let skinMat = new THREE.MeshStandardMaterial({ color: 0xffd1b3 });
            let leftLeg = new THREE.Mesh(legGeo, skinMat);
            leftLeg.position.set(-0.2, 0.29, 0); 
            leftLeg.castShadow = true; 
            group.add(leftLeg);
            
            let rightLeg = leftLeg.clone(); 
            rightLeg.position.x = 0.2; 
            group.add(rightLeg);

            let armGeo = new THREE.BoxGeometry(0.14, 0.65, 0.14);
            let leftArm = new THREE.Mesh(armGeo, coatMat); 
            leftArm.position.set(-0.5, 1.35, 0); leftArm.castShadow = true;
            group.add(leftArm);
            
            let rightArm = leftArm.clone(); rightArm.position.x = 0.5; group.add(rightArm);

            // মাথার উপর নাম যোগ করা (CSS2D)
            const div = document.createElement('div');
            div.className = `character-label ${className}`;
            div.textContent = nameText;
            const label = new THREE.CSS2DObject(div);
            label.position.set(0, 2.6, 0);
            group.add(label);

            if (isThief) { tLeftLeg = leftLeg; tRightLeg = rightLeg; } 
            else { pLeftLeg = leftLeg; pRightLeg = rightLeg; pLeftArm = leftArm; pRightArm = rightArm; }
            return group;
        }

        function createWifeCharacter(nameText, className) {
            const group = new THREE.Group();
            let sareeMat = new THREE.MeshStandardMaterial({ color: 0xff007f, roughness: 0.5 });
            let body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 1.1, 16), sareeMat);
            body.position.y = 0.6; body.castShadow = true;
            group.add(body);
            
            let head = new THREE.Mesh(new THREE.SphereGeometry(0.23, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffd1b3 }));
            head.position.y = 1.45; group.add(head);

            let hairMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            let longHair = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.18), hairMat);
            longHair.position.set(0, 1.2, 0.15); group.add(longHair);

            group.rotation.z = Math.PI / 2.5; 

            // বউয়ের মাথার উপর নাম যোগ করা
            const div = document.createElement('div');
            div.className = `character-label ${className}`;
            div.textContent = nameText;
            const label = new THREE.CSS2DObject(div);
            label.position.set(0, 2.0, 0);
            group.add(label);

            return group;
        }

        function spawnTree(zPos) {
            let tree = new THREE.Group();
            let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.3, 3.0, 10), new THREE.MeshStandardMaterial({ color: 0x4a2c11, roughness: 0.9 }));
            trunk.position.y = 1.5; trunk.castShadow = true;
            tree.add(trunk);
            
            let leavesMat = new THREE.MeshStandardMaterial({ color: 0x1b4d22, roughness: 0.6 }); 
            let leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(1.4, 1), leavesMat);
            leaves.position.y = 3.3; leaves.castShadow = true;
            tree.add(leaves);
            
            let side = Math.random() > 0.5 ? 1 : -1;
            tree.position.set(side * (5.5 + Math.random() * 6), 0, zPos);
            scene.add(tree); environmentObjects.push(tree);
        }

        function spawnLau() {
            let lauGroup = new THREE.Group();
            let lauMat = new THREE.MeshStandardMaterial({ color: 0x8efc00, roughness: 0.2, metalness: 0.1 }); 

            let bottom = new THREE.Mesh(new THREE.SphereGeometry(0.44, 16, 16), lauMat);
            bottom.position.y = 0.4; bottom.castShadow = true;
            lauGroup.add(bottom);

            let neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.36, 0.8, 12), lauMat);
            neck.position.y = 0.9; neck.castShadow = true;
            lauGroup.add(neck);

            let randomLane = lanes[Math.floor(Math.random() * 3)];
            lauGroup.position.set(randomLane, -0.05, -90); 
            
            scene.add(lauGroup);
            obstacles.push(lauGroup);
        }

        function togglePause() { 
            if (!gameActive) return; 
            isPaused = !isPaused; 
            document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none'; 
            
            if (bgmSound) {
                if (isPaused) { if(typeof bgmSound.pause === 'function') bgmSound.pause(); } 
                else { if(typeof bgmSound.play === 'function') bgmSound.play(); }
            }
        }
        
        function gameOver() { 
            gameActive = false; 
            document.getElementById('game-over-screen').style.display = 'flex'; 
            document.getElementById('final-score').innerText = "আপনার স্কোর: " + Math.floor(score);
            if (bgmSound && typeof bgmSound.stop === 'function') bgmSound.stop();
        }

        function restartGame() {
            for (let i = 0; i < obstacles.length; i++) scene.remove(obstacles[i]); obstacles = [];
            targetX = 0; currentLane = 1; score = 0;
            speed = baseSpeed; 
            
            player.position.set(0, 0, 0); player.rotation.z = 0; 
            thief.position.set(0, 0, -12); 
            playerVelocityY = 0; isGrounded = true; gameActive = true; isPaused = false; spawnTimer = 0; animationTime = 0;
            
            document.getElementById('game-over-screen').style.display = 'none'; 
            document.getElementById('pause-screen').style.display = 'none';
            document.getElementById('score-val').innerText = "0";
            
            if (bgmSound && typeof bgmSound.play === 'function') bgmSound.play();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive && !isPaused) {
                animationTime += 0.18; 
                score += 0.15; 
                document.getElementById('score-val').innerText = Math.floor(score);

                speed += 0.00003; 
                if(speed > 0.45) speed = 0.45; 

                let xDiff = targetX - player.position.x;
                player.position.x += xDiff * 0.18; 
                player.rotation.z = -xDiff * 0.18;

                if(player.position.x > 3.0) player.position.x = 3.0;
                if(player.position.x < -3.0) player.position.x = -3.0;

                player.position.y += playerVelocityY; 
                playerVelocityY += gravity;
                
                if (player.position.y <= 0) { 
                    player.position.y = 0; 
                    playerVelocityY = 0; 
                    isGrounded = true; 
                }

                if (isGrounded) {
                    pLeftLeg.rotation.x = Math.sin(animationTime) * 0.75; 
                    pRightLeg.rotation.x = -Math.sin(animationTime) * 0.75;
                    pLeftArm.rotation.x = -Math.sin(animationTime) * 0.6; 
                    pRightArm.rotation.x = Math.sin(animationTime) * 0.6;
                    player.position.y = Math.abs(Math.sin(animationTime * 2)) * 0.08;
                } else {
                    pLeftLeg.rotation.x = -0.4; pRightLeg.rotation.x = 0.2;
                    pLeftArm.rotation.x = 0.4; pRightArm.rotation.x = -0.3;
                }

                thief.position.z = player.position.z - 12;
                thief.position.x = THREE.MathUtils.lerp(thief.position.x, player.position.x * 0.7, 0.05); 
                tLeftLeg.rotation.x = Math.sin(animationTime * 1.1) * 0.6; 
                tRightLeg.rotation.x = -Math.sin(animationTime * 1.1) * 0.6;
                
                wife.position.set(thief.position.x + 0.4, thief.position.y + 1.2, thief.position.z);

                camera.position.z = player.position.z + 8.5; 
                camera.position.x = player.position.x * 0.5;

                envTimer++; 
                if(envTimer > 25) { 
                    spawnTree(-200); 
                    envTimer = 0; 
                }
                for (let i = environmentObjects.length - 1; i >= 0; i--) {
                    environmentObjects[i].position.z += speed;
                    if (environmentObjects[i].position.z > 15) { 
                        scene.remove(environmentObjects[i]); 
                        environmentObjects.splice(i, 1); 
                    }
                }

                spawnTimer++; 
                if (spawnTimer > 45) { 
                    spawnLau(); 
                    spawnTimer = 0; 
                }
                
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;
                    
                    let diffX = Math.abs(player.position.x - obstacles[i].position.x);
                    let diffZ = Math.abs(player.position.z - obstacles[i].position.z);
                    
                    if (diffX < 0.8 && diffZ < 0.8) { 
                        if (player.position.y < 1.2) {
                            gameOver(); 
                        }
                    }
                    if (obstacles[i].position.z > 15) { 
                        scene.remove(obstacles[i]); 
                        obstacles.splice(i, 1); 
                    }
                }
            }
            if(renderer) renderer.render(scene, camera);
            if(labelRenderer) labelRenderer.render(scene, camera); 
        }

        function onWindowResize() { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
