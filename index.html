<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>লাউ রানার - অপূর্ব গোধূলি সন্ধ্যা সংস্করণ</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a0f2e; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* টপ বার স্টাইলিং */
        #top-bar { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .ui-btn { background: linear-gradient(135deg, #ff4e50, #f9d423); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 78, 80, 0.4); transition: transform 0.2s, background 0.3s; }
        .ui-btn:active { transform: scale(0.95); }
        #restart-btn-ui { background: linear-gradient(135deg, #e65c00, #f9d423); box-shadow: 0 4px 15px rgba(230, 92, 0, 0.4); }
        
        /* স্কোর ডিসপ্লে */
        #score-board { position: absolute; top: 75px; left: 20px; background: rgba(30, 10, 40, 0.6); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 18px; font-weight: bold; border: 1px solid rgba(255, 100, 100, 0.2); backdrop-filter: blur(5px); z-index: 10; }
        #score-val { color: #ffa500; font-size: 22px; text-shadow: 0 0 5px rgba(255,165,0,0.5); }

        /* কন্ট্রোল বাটনসমূহ */
        #controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .nav-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.12); border: 2px solid rgba(255, 120, 120, 0.4); color: white; border-radius: 50%; font-size: 28px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .nav-btn:active { background: rgba(255, 255, 255, 0.3); }
        #jump-btn { width: 95px; height: 95px; background: linear-gradient(135deg, #ff4e50, #f9d423); border: 3px solid #ffffff; color: white; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 20px rgba(255, 78, 80, 0.6); transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #jump-btn:active { transform: scale(0.9); }

        /* ওভারলে স্ক্রিনসমূহ */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(25, 10, 30, 0.88); display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; z-index: 20; backdrop-filter: blur(8px); }
        #game-over-text { font-size: 42px; color: #ff4e50; text-align: center; font-weight: 900; text-shadow: 0 4px 10px rgba(255, 78, 80, 0.5); animation: pulse 1s infinite alternate; }
        
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, #2b1055, #7597de); display:flex; flex-direction: column; justify-content:center; align-items:center; z-index:100; }
        .game-title { color: #ffffff; font-size: 38px; font-weight: bold; margin-bottom: 30px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); text-align: center; }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 4px 10px rgba(255, 78, 80, 0.3); }
            100% { transform: scale(1.05); text-shadow: 0 4px 20px rgba(255, 78, 80, 0.7); }
        }
    </style>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <div class="game-title">🌇 লাউ রানার 3D <br><span style="font-size: 20px; color: #f9d423;">অপূর্ব গোধূলি সন্ধ্যা ও সুপার ফাস্ট সংস্করণ</span></div>
        <button class="ui-btn" style="font-size: 24px; padding: 18px 50px; background: linear-gradient(135deg, #ff4e50, #f9d423); box-shadow: 0 6px 20px rgba(255,78,80,0.5);" onclick="startTheGame()">গেম শুরু করুন 🚀</button>
    </div>

    <div id="top-bar">
        <button class="ui-btn" onclick="togglePause()" id="pause-btn-ui">PAUSE</button>
        <button class="ui-btn" id="restart-btn-ui" onclick="restartGame()">RESTART</button>
    </div>

    <div id="score-board">স্কোর: <span id="score-val">0</span></div>

    <div id="controls-container">
        <button class="nav-btn" id="left-btn">◀</button>
        <button id="jump-btn">JUMP</button>
        <button class="nav-btn" id="right-btn">▶</button>
    </div>

    <div id="game-over-screen" class="overlay-screen">
        <div id="game-over-text">⚠️ এই লাউ ঢুকে গেল..!</div>
        <div id="final-score" style="color: white; font-size: 22px; margin-top: 15px;">আপনার স্কোর: 0</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px; background: linear-gradient(135deg, #ff4e50, #f9d423);" onclick="restartGame()">আবার খেলুন 🔄</button>
    </div>

    <div id="pause-screen" class="overlay-screen">
        <div style="font-size: 40px; color: white; font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">গেম থামানো হয়েছে ⏸</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px; background: linear-gradient(135deg, #e65c00, #f9d423);" onclick="togglePause()">RESUME ▶</button>
    </div>

    <script>
        let scene, camera, renderer, player, thief, wife;
        let obstacles = [], environmentObjects = [];
        let lanes = [-2.2, 0, 2.2], currentLane = 1, targetX = 0;
        
        let isGrounded = true;
        let playerVelocityY = 0;
        const gravity = -0.026; // আরও গতি বাড়ায় অভিকর্ষজ বল সামান্য বাড়ানো হলো যেন জাম্প পারফেক্ট থাকে
        const jumpForce = 0.50; // স্পীডের সাথে সামঞ্জস্য রেখে লাফের উচ্চতা ও জোর বাড়ানো হয়েছে

        let gameActive = false, isPaused = false;
        
        // মেনের দৌড়ানোর স্পীড আরও বাড়ানো হলো (০.২৮ থেকে বাড়িয়ে ০.৩৬ করা হলো)
        const baseSpeed = 0.36; 
        let speed = baseSpeed; 
        
        let score = 0;
        let spawnTimer = 0, envTimer = 0, animationTime = 0;
        let pLeftLeg, pRightLeg, pLeftArm, pRightArm, tLeftLeg, tRightLeg;

        let audioListener, bgmSound;
        const audioUrl = 'https://www.image2url.com/r2/default/audio/1780138650031-27a68bd5-d29e-4008-a59e-1a0beee58ccc.mp3';

        function startTheGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            init();
            animate();
            setupAudio();
            setupControls();
        }

        function setupAudio() {
            if (!audioListener) {
                audioListener = new THREE.AudioListener();
                camera.add(audioListener);
            }
            if (audioListener.context && audioListener.context.state === 'suspended') {
                audioListener.context.resume();
            }

            bgmSound = new THREE.Audio(audioListener);
            const audioLoader = new THREE.AudioLoader();
            
            audioLoader.load(audioUrl, function(buffer) {
                bgmSound.setBuffer(buffer);
                bgmSound.setLoop(true);
                bgmSound.setVolume(0.7);
                if (gameActive && !isPaused) {
                    bgmSound.play();
                }
            }, null, function(err) {
                playFallbackAudio();
            });
        }

        function playFallbackAudio() {
            try {
                let audio = new Audio(audioUrl);
                audio.loop = true;
                audio.volume = 0.7;
                audio.play();
                bgmSound = {
                    play: () => audio.play(),
                    pause: () => audio.pause(),
                    stop: () => { audio.pause(); audio.currentTime = 0; },
                    isPlaying: !audio.paused
                };
            } catch(e) {
                console.error("Audio failed: ", e);
            }
        }

        function setupControls() {
            document.getElementById('jump-btn').addEventListener('click', function(e) { e.preventDefault(); triggerJump(); });
            document.getElementById('jump-btn').addEventListener('touchstart', function(e) { e.preventDefault(); triggerJump(); });
            document.getElementById('left-btn').addEventListener('click', function(e) { e.preventDefault(); moveSide(-1); });
            document.getElementById('left-btn').addEventListener('touchstart', function(e) { e.preventDefault(); moveSide(-1); });
            document.getElementById('right-btn').addEventListener('click', function(e) { e.preventDefault(); moveSide(1); });
            document.getElementById('right-btn').addEventListener('touchstart', function(e) { e.preventDefault(); moveSide(1); });

            window.addEventListener('keydown', (e) => {
                if (!gameActive || isPaused) return;
                if (e.code === 'Space' || e.code === 'ArrowUp') triggerJump();
                if (e.code === 'ArrowLeft') moveSide(-1);
                if (e.code === 'ArrowRight') moveSide(1);
            });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', handleTilt);
            }
        }

        function init() {
            scene = new THREE.Scene();
            
            // অপূর্ব গোধূলি সন্ধ্যার আবহ (Sunset Sky Mesh Theme)
            // নিচে কমলা/লাল এবং উপরে হালকা বেগুনি সন্ধ্যার আকাশ
            scene.background = new THREE.Color(0x3a1c4d); 
            scene.fog = new THREE.FogExp2(0x3a1c4d, 0.018); // সন্ধ্যার হালকা কুয়াশা ও আবছা মেঘের আবহ

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4.9, 7.5);
            camera.lookAt(0, 1.8, -4);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 0.95; // সন্ধ্যার কোমল আলো ফুটিয়ে তুলতে এক্সপোজার কিছুটা কম
            document.body.appendChild(renderer.domElement);

            // গোধূলি সন্ধ্যার লাইটিং (Sunset Ambient Atmosphere)
            let ambientLight = new THREE.AmbientLight(0xff6b6b, 0.55); // সন্ধ্যার লালচে-গোলাপী আভা
            scene.add(ambientLight);

            let hemiLight = new THREE.HemisphereLight(0x7a5c93, 0x24142c, 0.35); // আকাশ ও মাটির আলোর অনুপাত
            hemiLight.position.set(0, 30, 0);
            scene.add(hemiLight);

            // ডুবন্ত সূর্য (Setting Sun - Low angle warm light)
            let sunsetLight = new THREE.DirectionalLight(0xff7e47, 1.8); // ডুবন্ত সূর্যের কড়া কমলা আলো
            sunsetLight.position.set(-25, 8, -30); // দূর দিগন্ত থেকে আলো আসছে এমন পজিশন
            sunsetLight.castShadow = true;
            sunsetLight.shadow.mapSize.width = 2048;
            sunsetLight.shadow.mapSize.height = 2048;
            sunsetLight.shadow.bias = -0.0004;
            scene.add(sunsetLight);

            // আকাশে হালকা মেঘ মেঘ ভাব তৈরি (Procedural Sunset Clouds)
            createSunsetClouds();

            // সন্ধ্যার অন্ধকারাচ্ছন্ন পিচ ঢালা রাস্তা
            let roadGeo = new THREE.BoxGeometry(7.2, 0.2, 1000);
            let roadMat = new THREE.MeshStandardMaterial({ color: 0x1b1424, roughness: 0.8, metalness: 0.05 });
            let road = new THREE.Mesh(roadGeo, roadMat);
            road.position.z = -450;
            road.receiveShadow = true;
            scene.add(road);

            // গোধূলি আলোর নিয়ন বা ট্র্যাকিং বর্ডার
            for(let l of lanes) {
                let lineGeo = new THREE.BoxGeometry(0.12, 0.22, 1000);
                let lineMat = new THREE.MeshStandardMaterial({ color: 0xff4500, roughness: 0.1 }); // জ্বলজ্বলে লালচে-কমলা লাইন
                let line = new THREE.Mesh(lineGeo, lineMat);
                line.position.set(l, -0.01, -450);
                scene.add(line);
            }

            // সন্ধ্যার হালকা আবছা মাঠের ঘাস (Deep Golden-Green in shadow)
            let grassMat = new THREE.MeshStandardMaterial({ color: 0x2b4c1f, roughness: 0.9 });
            let grassL = new THREE.Mesh(new THREE.BoxGeometry(60, 0.1, 1000), grassMat);
            grassL.position.set(-33.6, -0.05, -450);
            grassL.receiveShadow = true;
            scene.add(grassL);
            
            let grassR = grassL.clone(); 
            grassR.position.x = 33.6; 
            scene.add(grassR);

            player = createHumanCharacter(false); 
            scene.add(player);
            
            thief = createHumanCharacter(true); 
            thief.position.set(0, 0, -15); 
            scene.add(thief); 
            
            wife = createWifeCharacter(); 
            scene.add(wife);

            for(let i=0; i<16; i++) {
                spawnTree((Math.random() * -300) - 20);
            }

            window.addEventListener('resize', onWindowResize);
        }

        // আকাশে গোধূলি সন্ধ্যার মেঘ তৈরির স্পেশাল ফাংশন
        function createSunsetClouds() {
            let cloudMat = new THREE.MeshLambertMaterial({
                color: 0xff6b81,
                transparent: true,
                opacity: 0.25
            });
            
            for(let i=0; i<12; i++) {
                let cloudGroup = new THREE.Group();
                let numBlobs = 3 + Math.floor(Math.random() * 4);
                
                for(let j=0; j<numBlobs; j++) {
                    let blob = new THREE.Mesh(new THREE.SphereGeometry(4 + Math.random() * 5, 8, 8), cloudMat);
                    blob.position.set(j * 5, Math.random() * 2, Math.random() * 2);
                    blob.scale.set(1.5, 0.5, 1); // চ্যাপ্টা মেঘের শেপ
                    cloudGroup.add(blob);
                }
                
                cloudGroup.position.set(
                    (Math.random() - 0.5) * 80,
                    15 + Math.random() * 10,
                    -50 - (Math.random() * 150)
                );
                scene.add(cloudGroup);
                environmentObjects.push(cloudGroup); // মেঘগুলোও ধীরে ধীরে মুভ করবে
            }
        }

        function handleTilt(event) {
            if (!gameActive || isPaused) return;
            let tilt = event.gamma; 
            if (tilt > 25) tilt = 25; if (tilt < -25) tilt = -25;
            targetX = (tilt / 25) * 2.2; 
        }

        function moveSide(dir) {
            if (!gameActive || isPaused) return;
            currentLane += dir;
            if(currentLane < 0) currentLane = 0;
            if(currentLane > 2) currentLane = 2;
            targetX = lanes[currentLane];
        }

        function triggerJump() { 
            if (isGrounded && gameActive && !isPaused) { 
                playerVelocityY = jumpForce; 
                isGrounded = false; 
            } 
        }

        function createHumanCharacter(isThief) {
            const group = new THREE.Group();
            
            let coatMat = new THREE.MeshStandardMaterial({ color: isThief ? 0x111111 : 0x3d348b, roughness: 0.5 });
            let coat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.85, 0.5), coatMat);
            coat.position.y = 1.4; 
            coat.castShadow = true; 
            coat.receiveShadow = true;
            group.add(coat);

            let buttonGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.06, 8);
            let btnMat = new THREE.MeshStandardMaterial({ color: 0xffbc42, metalness: 0.7 });
            let btn1 = new THREE.Mesh(buttonGeo, btnMat); 
            btn1.rotation.x = Math.PI / 2; 
            btn1.position.set(0, 1.5, -0.26); 
            group.add(btn1);
            
            let btn2 = btn1.clone(); 
            btn2.position.y = 1.25; 
            group.add(btn2);

            let lungiGroup = new THREE.Group();
            let lungiMat = new THREE.MeshStandardMaterial({ color: isThief ? 0x30011e : 0xf72585, roughness: 0.6 });
            let lungiMain = new THREE.Mesh(new THREE.CylinderGeometry(0.39, 0.43, 0.65, 16), lungiMat);
            lungiMain.castShadow = true;
            
            let borderMat = new THREE.MeshStandardMaterial({ color: 0x7209b7 });
            let border = new THREE.Mesh(new THREE.CylinderGeometry(0.432, 0.435, 0.06, 16), borderMat);
            border.position.y = -0.3; 
            lungiGroup.add(lungiMain, border); 
            lungiGroup.position.y = 0.88; 
            group.add(lungiGroup);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffc09f, roughness: 0.5 }));
            head.position.y = 1.98; 
            head.castShadow = true;
            group.add(head);

            if(isThief) {
                let mask = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.18, 0.3), new THREE.MeshStandardMaterial({ color: 0x050505 }));
                mask.position.set(0, 1.92, -0.12); group.add(mask);
                let cap = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.29, 0.14, 16), mask.material); 
                cap.position.y = 2.16; group.add(cap);
            } else {
                let hair = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.16, 0.32), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
                hair.position.set(0, 2.15, 0); group.add(hair);
            }

            let legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.58, 12);
            let skinMat = new THREE.MeshStandardMaterial({ color: 0xffc09f });
            let leftLeg = new THREE.Mesh(legGeo, skinMat);
            leftLeg.position.set(-0.2, 0.29, 0); 
            leftLeg.castShadow = true; 
            group.add(leftLeg);
            
            let rightLeg = leftLeg.clone(); 
            rightLeg.position.x = 0.2; 
            group.add(rightLeg);

            let armGeo = new THREE.BoxGeometry(0.14, 0.6, 0.14);
            let leftArm = new THREE.Mesh(armGeo, coatMat); 
            leftArm.position.set(-0.5, 1.35, 0); leftArm.castShadow = true;
            group.add(leftArm);
            
            let rightArm = leftArm.clone(); rightArm.position.x = 0.5; group.add(rightArm);

            if (isThief) { tLeftLeg = leftLeg; tRightLeg = rightLeg; } 
            else { pLeftLeg = leftLeg; pRightLeg = rightLeg; pLeftArm = leftArm; pRightArm = rightArm; }
            return group;
        }

        function createWifeCharacter() {
            const group = new THREE.Group();
            let sareeMat = new THREE.MeshStandardMaterial({ color: 0xb7094c, roughness: 0.5 });
            let body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 1.1, 16), sareeMat);
            body.position.y = 0.6; body.castShadow = true;
            group.add(body);
            
            let chest = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.48, 0.34), new THREE.MeshStandardMaterial({ color: 0xa01a58 }));
            chest.position.y = 1.18; group.add(chest);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffc09f }));
            head.position.y = 1.56; group.add(head);

            let hairMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.9 });
            let longHair = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.9, 0.16), hairMat);
            longHair.position.set(0, 1.22, 0.16); group.add(longHair);

            group.rotation.z = Math.PI / 2.4; 
            return group;
        }

        function spawnTree(zPos) {
            let tree = new THREE.Group();
            let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.28, 2.8, 10), new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.9 }));
            trunk.position.y = 1.4; trunk.castShadow = true;
            tree.add(trunk);
            
            // সন্ধ্যার আলোয় গাছের পাতা কালচে সবুজ-কমলা আভা মেশানো দেখাবে
            let leavesMat = new THREE.MeshStandardMaterial({ color: 0x145a32, roughness: 0.6 }); 
            let leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(1.3, 1), leavesMat);
            leaves.position.y = 3.0; leaves.castShadow = true;
            tree.add(leaves);
            
            let side = Math.random() > 0.5 ? 1 : -1;
            tree.position.set(side * (5.8 + Math.random() * 5), 0, zPos);
            scene.add(tree); environmentObjects.push(tree);
        }

        function spawnLau() {
            let lauGroup = new THREE.Group();
            let lauMat = new THREE.MeshStandardMaterial({ color: 0x7cb518, roughness: 0.3, metalness: 0.05 }); 

            let bottom = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 16), lauMat);
            bottom.position.y = 0.38; bottom.castShadow = true;
            lauGroup.add(bottom);

            let neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.35, 0.75, 12), lauMat);
            neck.position.y = 0.85; neck.castShadow = true;
            lauGroup.add(neck);

            let stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.2, 8), new THREE.MeshStandardMaterial({color:0x4f772d}));
            stem.position.y = 1.25; lauGroup.add(stem);

            let randomLane = lanes[Math.floor(Math.random() * 3)];
            lauGroup.position.set(randomLane, -0.05, -75); 
            
            scene.add(lauGroup);
            obstacles.push(lauGroup);
        }

        function togglePause() { 
            if (!gameActive) return; 
            isPaused = !isPaused; 
            document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none'; 
            
            if (bgmSound) {
                if (isPaused) { if(typeof bgmSound.pause === 'function') bgmSound.pause(); } 
                else { if(typeof bgmSound.play === 'function') bgmSound.play(); }
            }
        }
        
        function gameOver() { 
            gameActive = false; 
            document.getElementById('game-over-screen').style.display = 'flex'; 
            document.getElementById('final-score').innerText = "আপনার স্কোর: " + Math.floor(score);
            if (bgmSound && typeof bgmSound.stop === 'function') bgmSound.stop();
        }

        function restartGame() {
            for (let i = 0; i < obstacles.length; i++) scene.remove(obstacles[i]); obstacles = [];
            targetX = 0; currentLane = 1; score = 0;
            speed = baseSpeed; // নতুন সুপার ফাস্ট স্পীডে রিসেট
            
            player.position.set(0, 0, 0); player.rotation.z = 0; 
            thief.position.set(0, 0, -15); 
            playerVelocityY = 0; isGrounded = true; gameActive = true; isPaused = false; spawnTimer = 0; animationTime = 0;
            
            document.getElementById('game-over-screen').style.display = 'none'; 
            document.getElementById('pause-screen').style.display = 'none';
            document.getElementById('score-val').innerText = "0";
            
            if (bgmSound && typeof bgmSound.play === 'function') bgmSound.play();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive && !isPaused) {
                // সুপার ফাস্ট স্পীডের সাথে মানানসই পায়ের মুভমেন্ট গতি বাড়ানো হলো
                animationTime += 0.32; 
                score += 0.25; // দ্রুত গতির কারণে স্কোরও দ্রুত বাড়বে
                document.getElementById('score-val').innerText = Math.floor(score);

                // গতি ক্রমান্বয়ে বৃদ্ধি
                speed += 0.00009;

                let xDiff = targetX - player.position.x;
                player.position.x += xDiff * 0.22; // লেন চেঞ্জিং আরও রেসপন্সিভ ও ফাস্ট করা হয়েছে
                player.rotation.z = -xDiff * 0.22;

                if(player.position.x > 3.2) player.position.x = 3.2;
                if(player.position.x < -3.2) player.position.x = -3.2;

                player.position.y += playerVelocityY; 
                playerVelocityY += gravity;
                
                if (player.position.y <= 0) { 
                    player.position.y = 0; 
                    playerVelocityY = 0; 
                    isGrounded = true; 
                }

                if (isGrounded) {
                    pLeftLeg.rotation.x = Math.sin(animationTime) * 0.95; 
                    pRightLeg.rotation.x = -Math.sin(animationTime) * 0.95;
                    pLeftArm.rotation.x = -Math.sin(animationTime) * 0.8; 
                    pRightArm.rotation.x = Math.sin(animationTime) * 0.8;
                    player.position.y = Math.abs(Math.sin(animationTime * 2)) * 0.12;
                } else {
                    pLeftLeg.rotation.x = -0.5; pRightLeg.rotation.x = 0.2;
                    pLeftArm.rotation.x = 0.6; pRightArm.rotation.x = -0.4;
                }

                thief.position.z = player.position.z - 15;
                thief.position.x = THREE.MathUtils.lerp(thief.position.x, player.position.x * 0.6, 0.06); 
                tLeftLeg.rotation.x = Math.sin(animationTime * 1.2) * 0.7; 
                tRightLeg.rotation.x = -Math.sin(animationTime * 1.2) * 0.7;
                
                wife.position.set(thief.position.x + 0.38, thief.position.y + 1.15, thief.position.z - 0.1);

                camera.position.z = player.position.z + 7.5; 
                camera.position.x = player.position.x * 0.5;

                envTimer++; 
                if(envTimer > 15) { // দ্রুত গতির কারণে গাছ ও মেঘ দ্রুত জেনারেট হবে
                    spawnTree(-150); 
                    envTimer = 0; 
                }
                for (let i = environmentObjects.length - 1; i >= 0; i--) {
                    environmentObjects[i].position.z += speed;
                    
                    // মেঘের ক্ষেত্রে হালকা মৃদু বাতাস বা প্যানিং এফেক্ট
                    if(environmentObjects[i].type === "Group" && environmentObjects[i].children[0] && environmentObjects[i].children[0].geometry.type === "SphereGeometry") {
                        environmentObjects[i].position.x += 0.02; // মেঘ আলতো করে ডানে সরবে
                    }
                    
                    if (environmentObjects[i].position.z > 12) { 
                        scene.remove(environmentObjects[i]); 
                        environmentObjects.splice(i, 1); 
                    }
                }

                spawnTimer++; 
                if (spawnTimer > 28) { // হাই স্পীডের কারণে লাউ একটু ঘন ঘন আসবে
                    spawnLau(); 
                    spawnTimer = 0; 
                }
                
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;
                    
                    let diffX = Math.abs(player.position.x - obstacles[i].position.x);
                    let diffZ = Math.abs(player.position.z - obstacles[i].position.z);
                    
                    if (diffX < 0.85 && diffZ < 0.9) { 
                        if (player.position.y < 1.35) {
                            gameOver(); 
                        }
                    }
                    if (obstacles[i].position.z > 12) { 
                        scene.remove(obstacles[i]); 
                        obstacles.splice(i, 1); 
                    }
                }
            }
            if(renderer) renderer.render(scene, camera);
        }

        function onWindowResize() { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        }
    </script>
</body>
