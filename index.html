<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>লাউ রানার - মিউজিক সংস্করণ</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: Arial, sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #top-bar { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 10; }
        .ui-btn { background: rgba(0, 0, 0, 0.7); color: white; border: 2px solid #fff; padding: 10px 18px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* টাচ বাটনসমূহ */
        #controls-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; z-index: 10; }
        .nav-btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 2px solid #fff; color: white; border-radius: 50%; font-size: 24px; font-weight: bold; }
        #jump-btn { width: 85px; height: 85px; background: rgba(0, 255, 255, 0.4); border: 3px solid #00ffff; color: white; border-radius: 50%; font-size: 18px; font-weight: bold; }

        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; z-index: 20; }
        #game-over-text { font-size: 45px; color: #FFD700; text-align: center; font-weight: 900; text-shadow: 4px 4px 0px #000; animation: shake 0.5s infinite; }
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#111; display:flex; justify-content:center; align-items:center; z-index:100; }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <button class="ui-btn" style="font-size: 22px; padding: 20px 40px; background:#28a745;" onclick="startTheGame()">গেম শুরু করুন 🏃‍♂️</button>
    </div>

    <div id="top-bar">
        <button class="ui-btn" onclick="togglePause()" id="pause-btn-ui">PAUSE</button>
        <button class="ui-btn" onclick="restartGame()">RESTART</button>
    </div>

    <div id="controls-container">
        <button class="nav-btn" onclick="moveSide(-1)">◀</button>
        <button id="jump-btn" onclick="triggerJump()">JUMP</button>
        <button class="nav-btn" onclick="moveSide(1)">▶</button>
    </div>

    <div id="game-over-screen" class="overlay-screen">
        <div id="game-over-text">এই লাউ ঢুকে গেল..!</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px;" onclick="restartGame()">আবার খেলুন</button>
    </div>

    <div id="pause-screen" class="overlay-screen">
        <div style="font-size: 40px; color: white; font-weight: bold;">গেম থামানো হয়েছে</div>
        <button class="ui-btn" style="margin-top:30px; font-size:20px;" onclick="togglePause()">RESUME</button>
    </div>

    <script>
        let scene, camera, renderer, player, thief, wife;
        let obstacles = [], environmentObjects = [];
        let lanes = [-2.2, 0, 2.2], currentLane = 1, targetX = 0;
        let isGrounded = true, playerVelocityY = 0;
        const gravity = -0.016, jumpForce = 0.35;
        let gameActive = false, isPaused = false, speed = 0.18, spawnTimer = 0, envTimer = 0, animationTime = 0;
        let pLeftLeg, pRightLeg, pLeftArm, pRightArm, tLeftLeg, tRightLeg, tLeftArm, tRightArm;

        // অডিও ভ্যারিয়েবলস
        let bgmSound;

        function startTheGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            init();
            animate();
            
            // মোশন/টিল্ট সেন্সর একটিভ করা
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') window.addEventListener('deviceorientation', handleTilt);
                });
            } else {
                window.addEventListener('deviceorientation', handleTilt);
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3c2ff);
            scene.fog = new THREE.FogExp2(0xa3c2ff, 0.012);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4.6, 6.8);
            camera.lookAt(0, 1.6, -4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // --- ব্যাকগ্রাউন্ড মিউজিক সেটআপ ---
            const listener = new THREE.AudioListener();
            camera.add(listener); // ক্যামেরার সাথে লিসেনার যুক্ত করা হলো

            bgmSound = new THREE.Audio(listener);
            const audioLoader = new THREE.AudioLoader();
            
            // আপনার দেওয়া অডিও লিংকটি এখানে ব্যবহার করা হয়েছে
            audioLoader.load('https://www.image2url.com/r2/default/audio/1780138650031-27a68bd5-d29e-4008-a59e-1a0beee58ccc.mp3', function(buffer) {
                bgmSound.setBuffer(buffer);
                bgmSound.setLoop(true); // গানটি লুপ মোডে বাজবে (অনন্তকাল ধরে চলবে)
                bgmSound.setVolume(0.6); // ভলিউম ৬০% রাখা হয়েছে
                bgmSound.play(); // গান চালু
            });

            // লাইটিং
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            let dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            //...রাস্তা ও মাঠ
            let road = new THREE.Mesh(new THREE.BoxGeometry(7, 0.1, 1000), new THREE.MeshStandardMaterial({ color: 0x946b45, roughness: 0.9 }));
            road.position.z = -450; scene.add(road);
            let grassL = new THREE.Mesh(new THREE.BoxGeometry(60, 0.05, 1000), new THREE.MeshStandardMaterial({ color: 0x4c932c, roughness: 1.0 }));
            grassL.position.set(-33.5, -0.02, -450); scene.add(grassL);
            let grassR = grassL.clone(); grassR.position.x = 33.5; scene.add(grassR);

            // ক্যারেক্টার জেনারেশন
            player = createHumanCharacter(false); scene.add(player);
            thief = createHumanCharacter(true); thief.position.set(0, 0, -15); scene.add(thief); 
            wife = createWifeCharacter(); scene.add(wife);

            for(let i=0; i<12; i++) spawnTree((Math.random() * -200));
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space' && gameActive && !isPaused && isGrounded) triggerJump();
            });
        }

        function handleTilt(event) {
            if (!gameActive || isPaused) return;
            let tilt = event.gamma; 
            if (tilt > 22) tilt = 22; if (tilt < -22) tilt = -22;
            targetX = (tilt / 22) * 2.2; 
        }

        function moveSide(dir) {
            if (!gameActive || isPaused) return;
            currentLane += dir;
            if(currentLane < 0) currentLane = 0;
            if(currentLane > 2) currentLane = 2;
            targetX = lanes[currentLane];
        }

        function createHumanCharacter(isThief) {
            const group = new THREE.Group();
            let coat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.45), new THREE.MeshStandardMaterial({ color: isThief ? 0x222222 : 0x111111, roughness: 0.5 }));
            coat.position.y = 1.4; coat.castShadow = true; group.add(coat);

            let buttonGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.05, 6);
            let btnMat = new THREE.MeshStandardMaterial({ color: 0xd4af37 });
            let btn1 = new THREE.Mesh(buttonGeo, btnMat); btn1.rotation.x = Math.PI / 2; btn1.position.set(0, 1.5, -0.23); group.add(btn1);
            let btn2 = btn1.clone(); btn2.position.y = 1.3; group.add(btn2);

            let lungiGroup = new THREE.Group();
            let lungiMain = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.42, 0.6, 12), new THREE.MeshStandardMaterial({ color: isThief ? 0x5a189a : 0x0077b6, roughness: 0.8 }));
            let border = new THREE.Mesh(new THREE.CylinderGeometry(0.422, 0.425, 0.05, 12), new THREE.MeshStandardMaterial({ color: 0xffb703 }));
            border.position.y = -0.28; lungiGroup.add(lungiMain, border); lungiGroup.position.y = 0.9; group.add(lungiGroup);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 1.95; group.add(head);

            if(isThief) {
                let mask = new THREE.Mesh(new THREE.BoxGeometry(0.29, 0.18, 0.28), new THREE.MeshStandardMaterial({ color: 0x050505 }));
                mask.position.set(0, 1.9, -0.12); group.add(mask);
                let cap = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.28, 0.12, 12), mask.material); cap.position.y = 2.14; group.add(cap);
            } else {
                let hair = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.3), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                hair.position.set(0, 2.13, 0); group.add(hair);
            }

            let legGeo = new THREE.CylinderGeometry(0.11, 0.11, 0.6, 8);
            let leftLeg = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            leftLeg.position.set(-0.2, 0.3, 0); leftLeg.castShadow = true; group.add(leftLeg);
            let rightLeg = leftLeg.clone(); rightLeg.position.x = 0.2; group.add(rightLeg);

            let armGeo = new THREE.BoxGeometry(0.14, 0.6, 0.14);
            let leftArm = new THREE.Mesh(armGeo, coat.material); leftArm.position.set(-0.48, 1.3, 0); group.add(leftArm);
            let rightArm = leftArm.clone(); rightArm.position.x = 0.48; group.add(rightArm);

            if (isThief) { tLeftLeg = leftLeg; tRightLeg = rightLeg; tLeftArm = leftArm; tRightArm = rightArm; }
            else { pLeftLeg = leftLeg; pRightLeg = rightLeg; pLeftArm = leftArm; pRightArm = rightArm; }
            return group;
        }

        function createWifeCharacter() {
            const group = new THREE.Group();
            let body = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.27, 1.1, 12), new THREE.MeshStandardMaterial({ color: 0xd90429 }));
            body.position.y = 0.6; group.add(body);
            
            let chest = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.5, 0.35), new THREE.MeshStandardMaterial({ color: 0xffb703 }));
            chest.position.y = 1.2; group.add(chest);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.21, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffe0bd }));
            head.position.y = 1.58; group.add(head);

            // লম্বা কালো চুল
            let hairGeo = new THREE.BoxGeometry(0.26, 0.9, 0.15); 
            let hairMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.9 });
            let longHair = new THREE.Mesh(hairGeo, hairMat);
            longHair.position.set(0, 1.25, 0.16); 
            group.add(longHair);

            group.rotation.z = Math.PI / 2.3; 
            return group;
        }

        function spawnTree(zPos) {
            let tree = new THREE.Group();
            let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.3, 2.5, 8), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
            trunk.position.y = 1.25; tree.add(trunk);
            let leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0x3a5a40 }));
            leaves.position.y = 2.8; tree.add(leaves);
            tree.position.set((Math.random() > 0.5 ? 1 : -1) * (5.5 + Math.random() * 6), 0, zPos);
            scene.add(tree); environmentObjects.push(tree);
        }

        // রিয়ালিস্টিক সোজা খাড়া লাউ
        function spawnLau() {
            let lauGroup = new THREE.Group();
            let lauMat = new THREE.MeshStandardMaterial({ color: 0x55a630, roughness: 0.5 });

            let bottom = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), lauMat);
            bottom.position.y = 0.35; lauGroup.add(bottom);

            let neck = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.32, 0.7, 12), lauMat);
            neck.position.y = 0.8; lauGroup.add(neck);

            let stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.18, 6), new THREE.MeshStandardMaterial({color:0x2d5a27}));
            stem.position.y = 1.2; lauGroup.add(stem);

            let randomLane = lanes[Math.floor(Math.random() * 3)];
            lauGroup.position.set(randomLane, -0.1, -65); 
            
            scene.add(lauGroup);
            obstacles.push(lauGroup);
        }

        function triggerJump() { if (isGrounded && gameActive && !isPaused) { playerVelocityY = jumpForce; isGrounded = false; } }
        
        function togglePause() { 
            if (!gameActive) return; 
            isPaused = !isPaused; 
            document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none'; 
            
            // পজ করলে মিউজিক ও থমকে যাবে, রিসিউম করলে আবার চালু হবে
            if (bgmSound && bgmSound.isPlaying) {
                bgmSound.pause();
            } else if (bgmSound && !isPaused) {
                bgmSound.play();
            }
        }
        
        function gameOver() { 
            gameActive = false; 
            document.getElementById('game-over-screen').style.display = 'flex'; 
            if (bgmSound && bgmSound.isPlaying) bgmSound.stop(); // গেম ওভারে মিউজিক বন্ধ
        }

        function restartGame() {
            for (let i = 0; i < obstacles.length; i++) scene.remove(obstacles[i]); obstacles = [];
            targetX = 0; currentLane = 1; player.position.set(0, 0, 0); player.rotation.z = 0; 
            thief.position.set(0, 0, -15); 
            playerVelocityY = 0; isGrounded = true; gameActive = true; isPaused = false; spawnTimer = 0; animationTime = 0;
            document.getElementById('game-over-screen').style.display = 'none'; document.getElementById('pause-screen').style.display = 'none';
            
            if (bgmSound && !bgmSound.isPlaying) bgmSound.play(); // রিস্টার্টে গান আবার শুরু হবে
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive && !isPaused) {
                animationTime += 0.16;
                let xDiff = targetX - player.position.x;
                player.position.x += xDiff * 0.12; player.rotation.z = -xDiff * 0.18;

                if(player.position.x > 3.2) player.position.x = 3.2;
                if(player.position.x < -3.2) player.position.x = -3.2;

                player.position.y += playerVelocityY; playerVelocityY += gravity;
                if (player.position.y <= 0) { player.position.y = 0; playerVelocityY = 0; isGrounded = true; }

                if (isGrounded) {
                    pLeftLeg.rotation.x = Math.sin(animationTime) * 0.65; pRightLeg.rotation.x = -Math.sin(animationTime) * 0.65;
                    pLeftArm.rotation.x = -Math.sin(animationTime) * 0.5; pRightArm.rotation.x = Math.sin(animationTime) * 0.5;
                    player.position.y = Math.abs(Math.sin(animationTime * 2)) * 0.07;
                } else {
                    pLeftLeg.rotation.x = -0.4; pRightLeg.rotation.x = -0.4;
                    pLeftArm.rotation.x = 0.4; rightArm.rotation.x = 0.4;
                }

                // চোর প্লেয়ারের থেকে সবসময় ১৫ ইউনিট সামনে লকড থাকবে
                thief.position.z = player.position.z - 15;
                thief.position.x = THREE.MathUtils.lerp(thief.position.x, player.position.x * 0.6, 0.05); 
                
                tLeftLeg.rotation.x = Math.sin(animationTime * 1.1) * 0.6; tRightLeg.rotation.x = -Math.sin(animationTime * 1.1) * 0.6;
                wife.position.set(thief.position.x + 0.35, thief.position.y + 1.1, thief.position.z - 0.1);

                camera.position.z = player.position.z + 6.8; camera.position.x = player.position.x * 0.5;

                envTimer++; if(envTimer > 30) { spawnTree(-120); envTimer = 0; }
                for (let i = environmentObjects.length - 1; i >= 0; i--) {
                    environmentObjects[i].position.z += speed;
                    if (environmentObjects[i].position.z > 10) { scene.remove(environmentObjects[i]); environmentObjects.splice(i, 1); }
                }

                spawnTimer++; if (spawnTimer > 45) { spawnLau(); spawnTimer = 0; }
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;
                    let diffX = Math.abs(player.position.x - obstacles[i].position.x);
                    let diffZ = Math.abs(player.position.z - obstacles[i].position.z);
                    
                    if (diffX < 0.85 && diffZ < 0.85 && player.position.y < 1.2) { 
                        gameOver(); 
                    }
                    if (obstacles[i].position.z > 10) { scene.remove(obstacles[i]); obstacles.splice(i, 1); }
                }
            }
            if(renderer) renderer.render(scene, camera);
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    </script>
</body>
</html>
